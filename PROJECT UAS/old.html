<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Aplikasi Mahasiswa Baru USTI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #E6F1FB;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.75rem;
      font-size: 28px;
    }
    h2 {
      font-size: 17px;
      font-weight: bold;
      margin: 0 0 4px;
      color: #1a1a1a;
    }
    .sub {
      font-size: 13px;
      color: #666;
      margin: 0;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 1.25rem 0;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    input[type=text] {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    input[type=text]:focus {
      border-color: #185FA5;
    }
    .btn-save {
      width: 100%;
      padding: 10px;
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }
    .btn-save:hover {
      background: #0C447C;
    }
    .msg {
      margin-top: 1rem;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.ok {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .msg.err {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">🎓</div>
      <h2>Mahasiswa Baru USTI</h2>
      <p class="sub">Universitas Sains Dan Teknologi Indonesia</p>
    </div>
    <hr>
    <label for="nama">Nama Calon Mahasiswa</label>
    <input type="text" id="nama" placeholder="Masukkan nama lengkap" />
    <button class="btn-save" onclick="simpan()">SAVE</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    function simpan() {
      const nama = document.getElementById('nama').value.trim();
      const msg = document.getElementById('msg');
      msg.className = 'msg';

      if (!nama) {
        msg.className = 'msg err';
        msg.textContent = 'Tidak ada data yang diisi!';
        return;
      }

      msg.className = 'msg ok';
      msg.textContent = 'Data berhasil disimpan: ' + nama;
      document.getElementById('nama').value = '';
    }

    document.getElementById('nama').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') simpan();
    });
  </script>
</body>
</html>
