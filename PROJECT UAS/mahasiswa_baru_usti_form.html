
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body-like { display: block; }
.navbar {
  background: #185FA5;
  color: white;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 56px;
  border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
}
.navbar-logo {
  width: 36px; height: 36px;
  background: white;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.navbar-title { font-size: 14px; font-weight: 500; color: white; line-height: 1.3; }
.navbar-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
.page-bg {
  background: var(--color-background-tertiary);
  min-height: 420px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);
}
.card {
  background: var(--color-background-primary);
  border-radius: var(--border-radius-lg);
  border: 0.5px solid var(--color-border-tertiary);
  padding: 1.5rem;
  width: 100%;
  max-width: 360px;
}
.card-header {
  text-align: center;
  margin-bottom: 1.25rem;
}
.card-icon {
  width: 52px; height: 52px;
  background: #E6F1FB;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px;
  font-size: 24px;
}
.card-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 2px; }
.card-sub { font-size: 12px; color: var(--color-text-secondary); }
.divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1rem 0; }
.field-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 5px; display: block; }
.field-input {
  width: 100%;
  padding: 9px 12px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  font-size: 14px;
  color: var(--color-text-primary);
  background: var(--color-background-primary);
  outline: none;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: #185FA5; border-width: 1px; }
.btn-save {
  width: 100%;
  padding: 10px;
  background: #185FA5;
  color: white;
  border: none;
  border-radius: var(--border-radius-md);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 12px;
  letter-spacing: 0.5px;
}
.btn-save:hover { background: #0C447C; }
.btn-save:active { transform: scale(0.98); }
.result-box {
  margin-top: 12px;
  border-radius: var(--border-radius-md);
  padding: 12px 14px;
  display: none;
  font-size: 13px;
  border: 0.5px solid;
}
.result-box.ok {
  display: block;
  background: var(--color-background-success);
  color: var(--color-text-success);
  border-color: var(--color-border-success);
}
.result-box.err {
  display: block;
  background: var(--color-background-danger);
  color: var(--color-text-danger);
  border-color: var(--color-border-danger);
}
.result-header { display: flex; align-items: center; gap: 6px; font-weight: 500; margin-bottom: 6px; font-size: 13px; }
.badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}
.badge-ok { background: #1D9E75; color: white; }
.badge-err { background: #E24B4A; color: white; }
.result-main { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.result-detail { font-size: 11px; opacity: 0.85; line-height: 1.5; }
.detail-row { display: flex; gap: 6px; }
.detail-key { min-width: 80px; }
.timestamp { font-size: 10px; margin-top: 8px; opacity: 0.7; display: flex; align-items: center; gap: 4px; }
</style>

<div>
  <div class="navbar">
    <div class="navbar-logo">🎓</div>
    <div>
      <div class="navbar-title">Aplikasi Mahasiswa Baru USTI</div>
      <div class="navbar-sub">Universitas Sains Dan Teknologi Indonesia &nbsp;|&nbsp; Software Quality Assurance — Project Akhir UAS</div>
    </div>
  </div>

  <div class="page-bg">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">🎓</div>
        <div class="card-title">Form Pendaftaran Mahasiswa Baru USTI</div>
        <div class="card-sub">Masukkan nama calon mahasiswa</div>
      </div>
      <hr class="divider">
      <label class="field-label" for="nama">Nama Calon Mahasiswa</label>
      <input class="field-input" type="text" id="nama" placeholder="Masukkan nama lengkap" />
      <button class="btn-save" onclick="simpan()">SAVE</button>
      <div class="result-box" id="result"></div>
    </div>
  </div>
</div>

<script>
function detectType(val) {
  if (!val) return null;
  var hasAlpha = /[a-zA-Z]/.test(val);
  var hasNum = /[0-9]/.test(val);
  if (hasAlpha && hasNum) return { label: 'Karakter + Number', skenario: 3, cara: 'Ketik huruf+angka → klik tombol SAVE' };
  if (hasNum) return { label: 'Number', skenario: 2, cara: 'Ketik angka → tekan Enter atau klik tombol SAVE' };
  return { label: 'Character', skenario: 1, cara: 'Ketik huruf/teks → tekan Enter atau klik tombol SAVE' };
}

function now() {
  var d = new Date();
  var pad = function(n){ return n < 10 ? '0'+n : n; };
  return pad(d.getDate())+'-'+pad(d.getMonth()+1)+'-'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

function simpan() {
  var nama = document.getElementById('nama').value.trim();
  var box = document.getElementById('result');

  if (!nama) {
    box.className = 'result-box err';
    box.innerHTML =
      '<div class="result-header"><span class="badge badge-err">GAGAL</span> Skenario 4</div>' +
      '<div class="result-main" style="color:var(--color-text-danger)">Tidak ada data yang diisi!</div>' +
      '<div class="result-detail">' +
        '<div class="detail-row"><span class="detail-key">Cara uji</span><span>Biarkan kosong → klik tombol SAVE</span></div>' +
        '<div class="detail-row"><span class="detail-key">Hasil yg diharapkan</span><span>Muncul pesan error validasi</span></div>' +
      '</div>' +
      '<div class="timestamp"><i class="ti ti-clock" style="font-size:12px"></i> Waktu pengujian : '+now()+'</div>';
    return;
  }

  var t = detectType(nama);
  box.className = 'result-box ok';
  box.innerHTML =
    '<div class="result-header"><span class="badge badge-ok">BERHASIL</span> Skenario '+t.skenario+'</div>' +
    '<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">&#9658; Penggunaan '+t.label+'</div>' +
    '<div class="result-main" style="color:var(--color-text-success)">Data '+t.label.toLowerCase()+' berhasil disimpan: "'+nama+'"</div>' +
    '<div class="result-detail">' +
      '<div class="detail-row"><span class="detail-key">Cara uji</span><span>'+t.cara+'</span></div>' +
      '<div class="detail-row"><span class="detail-key">Foreground</span><span>Hijau — #1D9E75</span></div>' +
    '</div>' +
    '<div class="timestamp"><i class="ti ti-clock" style="font-size:12px"></i> Waktu pengujian : '+now()+'</div>';

  document.getElementById('nama').value = '';
}

document.getElementById('nama').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') simpan();
});
</script>
