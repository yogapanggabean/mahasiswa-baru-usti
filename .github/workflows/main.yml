name: SQA - Pengujian Aplikasi Mahasiswa Baru USTI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Deploy dan Validasi Aplikasi
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout kode dari repository
        uses: actions/checkout@v4

      - name: Step 2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 3 - Cek struktur folder
        run: |
          echo "Isi root folder:"
          ls -la
          echo ""
          echo "Mencari file index.html..."
          find . -name "index.html" | head -5

      - name: Step 4 - Validasi file HTML tersedia
        run: |
          if [ -f "index.html" ]; then
            HTML_FILE="index.html"
          elif [ -f "PROJECT UAS/index.html" ]; then
            HTML_FILE="PROJECT UAS/index.html"
          else
            HTML_FILE=$(find . -name "index.html" | head -1)
          fi
          echo "File ditemukan di: $HTML_FILE"
          echo "HTML_FILE=$HTML_FILE" >> $GITHUB_ENV

      - name: Step 5 - Install html-validate
        run: npm install -g html-validate

      - name: Step 6 - Cek elemen penting ada di HTML
        run: |
          echo "Mengecek elemen form di $HTML_FILE..."
          grep -q 'id="nama"' "$HTML_FILE" && echo "✅ Field nama ditemukan" || (echo "❌ Field nama tidak ada" && exit 1)
          grep -q 'btn' "$HTML_FILE" && echo "✅ Tombol SAVE ditemukan" || (echo "❌ Tombol SAVE tidak ada" && exit 1)
          grep -q 'id="rbox"' "$HTML_FILE" && echo "✅ Result box ditemukan" || (echo "❌ Result box tidak ada" && exit 1)
          grep -q 'function simpan' "$HTML_FILE" && echo "✅ Fungsi simpan ditemukan" || (echo "❌ Fungsi simpan tidak ada" && exit 1)

      - name: Step 7 - Cek skenario pengujian ada di script
        run: |
          echo "Mengecek logika skenario di $HTML_FILE..."
          grep -q 'Skenario 1' "$HTML_FILE" && echo "✅ Skenario 1 (Character) ada" || echo "❌ Skenario 1 tidak ada"
          grep -q 'Skenario 2' "$HTML_FILE" && echo "✅ Skenario 2 (Number) ada" || echo "❌ Skenario 2 tidak ada"
          grep -q 'Skenario 3' "$HTML_FILE" && echo "✅ Skenario 3 (Character+Number) ada" || echo "❌ Skenario 3 tidak ada"
          grep -q 'Skenario 4' "$HTML_FILE" && echo "✅ Skenario 4 (Kosong) ada" || echo "❌ Skenario 4 tidak ada"

      - name: Step 8 - Laporan hasil pengujian
        run: |
          echo "=================================="
          echo "  LAPORAN SQA - MAHASISWA BARU USTI"
          echo "=================================="
          echo "Tanggal  : $(date '+%d-%m-%Y %H:%M:%S')"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Status   : SELESAI"
          echo "=================================="
